        - generic [ref=e30]:
          - paragraph [ref=e31]: I was a boy scout as a kid, so I've always enjoyed the great outdoors. One day I hope to visit all the US national parks. Here are some of my favorite trips.
          - heading "Acadia 2026" [level=3] [ref=e32]
          - paragraph [ref=e33]: "Final Rating: 10/10"
          - figure "Mountain in Acadia" [ref=e34]:
            - img "Mountain in Acadia" [ref=e35]
          - paragraph [ref=e37]: Acadia is by far the best camping experience I've had. The nature is incredible and extremely diverse. There were beaches, mountains, forest trails all within 15 minutes drive within each other. It's also very close to a small town, so we were able to get groceries in the middle of the trip. Only advice would be to use the YMCAs for showering, instead of scammy coin operated showers.
          - figure "Beach in Acadia" [ref=e38]:
            - img "Beach in Acadia" [ref=e39]
          - figure "Lake in Acadia" [ref=e41]:
            - img "Lake in Acadia" [ref=e42]
          - heading "Shenandoah 2025" [level=3] [ref=e44]
          - paragraph [ref=e45]: "Final Rating: 7/10"
          - figure "Mountain Overlook in Shenandoah" [ref=e46]:
            - img "Mountain Overlook in Shenandoah" [ref=e47]
          - paragraph [ref=e49]: Shenandoah was a fun trip. I think it really encompasses a great vanilla camping experience. There's some nice hikes with cool river crossings and some great views on nearby mountains. The best part has to be the drive up to the campsite, why you get to see some incredible mountain overlooks. If you're going camping for the first time, I think its a great intro to national parks.
          - figure "Mountain in Shenandoah" [ref=e50]:
