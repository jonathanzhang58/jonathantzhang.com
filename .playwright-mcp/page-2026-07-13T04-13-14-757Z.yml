        - heading "Model United Nations" [level=2] [ref=f2e29]
        - generic [ref=f2e30]:
          - paragraph [ref=f2e31]: I did MUN in high school and I thought it was great, but my club was less a team and more "let's sit in a circle with the history teacher and talk about world politics." Surely collegiate MUN is the same thing right? NO. Competitive MUN is a unique and frightening experience that I can only describe as "competitive work politics". To award, it matters less so what laws are passed, and more so how well you "command" the room. As a result, you have a bunch of strong personalities in a room pretending to collaborate when really they're trying to make the other their pawn. It can be really frustrating sometimes, but also sometimes fun. Sometimes. Luckily for me it's just a hobby because I'm a STEM student. Here's some conferences I went to.
          - heading "UNCMUNC 2025" [level=3] [ref=f2e32]
          - paragraph [ref=f2e33]: UNC Chapel Hill's Conference. I did not win anything ;(
