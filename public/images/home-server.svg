<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#dbe2f7"/>
  <g stroke="#17181c" stroke-width="6" fill="none">
    <!-- server tower: three stacked bays -->
    <rect x="290" y="110" width="220" height="280"/>
    <line x1="290" y1="203" x2="510" y2="203"/>
    <line x1="290" y1="296" x2="510" y2="296"/>
    <!-- drive slots -->
    <line x1="330" y1="156" x2="420" y2="156"/>
    <line x1="330" y1="249" x2="420" y2="249"/>
    <line x1="330" y1="342" x2="420" y2="342"/>
  </g>
  <!-- status LEDs -->
  <circle cx="470" cy="156" r="9" fill="#1440c8"/>
  <circle cx="470" cy="249" r="9" fill="#1440c8"/>
  <circle cx="470" cy="342" r="9" fill="#1440c8"/>
</svg>
