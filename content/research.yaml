# The two labs you work in, shown side by side under the publications.
# "focus" is the small eyebrow line above the lab name. "link" is optional
# (lab name becomes clickable). Add as many paragraphs as you like — the
# page scrolls.
labs:
  - name: Oberst Lab
    focus: Machine learning & causal inference
    link: ''
    paragraphs:
      - >-
        Once a clinical trial has evaluated one ML decision-support model,
        what can it tell us about a new model that was never trialed? I
        work on partial-identification bounds for the downstream causal
        impact of untrialed models, using the idea of counterfactual
        correctness — whether the new model would have been right on trial
        subjects — together with a doubly-robust estimator that is
        consistent and asymptotically normal. This work was accepted at
        UAI 2026, where I'm the first author.
  - name: Feinberg Lab
    focus: Bioinformatics & epigenetics
    link: ''
    paragraphs:
      - >-
        I analyze whole-genome sequencing data in R and Julia on a remote
        Linux cluster, using mediation analysis to statistically rule out
        confounding in existing lab experiments. Along the way I
        consolidated the lab's scattered analysis scripts into unified
        pipelines, cutting required user input by more than half and
        speeding up runtime by 15%.
