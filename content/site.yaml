# Site-wide identity. Used in the hero, the sidebar, the nav logo, and tab titles.

# Your name, split into the lines it should occupy in the big hero display.
name_lines:
  - Jonathan
  - Zhang

# Short initials/logo shown at the left of the nav bar.
initials: J·Z

# The one-line affiliation shown under your name (hero + sidebar).
affiliation: Undergraduate — Johns Hopkins University / Applied Math & Statistics + Biomedical Engineering

# Shorter affiliation used in the narrow sidebar.
affiliation_short: Undergraduate — Johns Hopkins University

# Your mission / splash text (hero).
splash: >-
  I'm interested in the intersection of __artificial intelligence__, __medicine__, and __causal inference__.

  I've [published research](/research) in AI evaluation in healthcare. Over three years of research experience, I've also developed skills in bioinformatics, data analysis, software engineering, and wet lab techniques.
 
# Social / quick links shown in the sidebar (replaces the old splash line).
# Each entry: label + url. Leave the list empty to hide the block.
socials:
  - label: LinkedIn
    url: https://www.linkedin.com/in/jonathan-zhang-25702025b/
  - label: GitHub
    url: https://github.com/jonathanzhang58
  - label: Download CV
    url: files/cv.pdf

# Optional: path to a small square face photo for the sidebar, relative to public/
# (e.g. images/face.jpg). Leave empty to keep the smiley placeholder.
face: 'images/icon.webp'
