# Each list item is one paragraph.
paragraphs:
  - >-
    I'm an undergraduate at Johns Hopkins University studying Applied
    Mathematics & Statistics and Biomedical Engineering, with a minor in
    Computer Science. 
  - >-
    In the [Oberst](https://www.michaelkoberst.com/) Lab I work on causal bounds for ML-assisted
    decision-making. Recently, my first-author paper on the topic was accepted at
    UAI 2026! In the [Feinberg](https://www.bme.jhu.edu/people/faculty/andrew-p-feinberg/) Lab I work on developing computational tools for genomics using my statistical knowledge. Outside the lab I TA graduate machine
    learning and probability courses. I co-founded Aspire, a planning
    app for pre-med students, and founded the JHU chapter of Parkinson's Pals, a volunteer organization that connects students with people living with Parkinson's disease. 
  - >-
    If you're interested in collaborating on research or anything else, please reach out!
