# The Projects page. Add one block per project.
# "image" (relative to public/, e.g. images/proj1.png) and "link" are optional.
# Add "image_fit: contain" to show the whole image (with padding) instead of
# cropping it to fill the box.
#
# Any project (or hobby) can get its own blog-style page: add a "page:" list
# to the card and the whole card becomes clickable. Delete the "page:" block
# to turn the extra page off again. Inside "page:":
#   - a plain string is a paragraph
#   - "- heading: ..." is a section heading
#   - "- image: images/foo.jpg" is a full-width image ("caption:" optional)
# The URL is made from the title (e.g. /projects/home-server); add
# "slug: my-url" next to "title:" to override it. "link:" still works —
# it shows as a "Visit" button at the bottom of the page.

projects:
  # New project — fill in the fields below (image and link are optional).
  - title: Parkinson's Pals at JHU
    blurb: >-
      Volunteer organization that pairs undergraduate students at JHU with Parkinson's patients to provide companionship and support. I founded and lead the organization at JHU, which has grown to 50+ members and 20+ patient pairs. 
    image: 'images/parkinson.png'
    image_fit: contain
    link: 'https://jhuparkinsonspals.jonathantzhang.com/'
  - title: Aspire — the Pre-Med Planner
    blurb: >-
      500+ user cross-platform planning app for pre-med students with an AI-powered advising chatbot. Co-founder & COO;
      finalist at the SPARK ($500) and HopStart venture competitions.
    image: images/aspire-bw.png
    link: https://aspiredoctor.com
  - title: Breast Cancer Identification Trainer
    blurb: >-
      Training app for 50+ JHSOM radiology residents to practice breast cancer
      identification on IRB-approved de-identified mammograms, built with
      a JHSOM professor and practicing radiologist. Finalist in the JHU
      CBID Healthcare Design Competition.
    image: images/appScreenshot.png
    link: https://github.com/jonathanzhang58/MammologyApp
  - title: DeltaP - Bioimpedance Urine Output Monitor
    blurb: >-
      Bioimpedance-based urine output monitor for ICU patients to prevent acute kidney injury. Built with a
      JHSOM professor and practicing nephrologist, as part of JHU BME Design Teams. 1st place winner of SPARK SP2026 showcase ($2500), presented at JHU Design Day showcase. 
    image: images/DeltaP.png
    image_fit: contain
    link: /files/deltap-spark-pitch-deck.pdf
  - title: Kalman Filter Visualizer
    blurb: >-
      MATLAB implementation and visualization of the Kalman filter, built
      through the JHU AMS Directed Reading Program and presented at a
      departmental conference.
    image: images/velocity.png
    link: https://github.com/jonathanzhang58/Kalman-filter-algorithm-and-visualizer-
  - title: Home Server
    blurb: >-
      Repurposed old laptop as an Ubuntu home server used for file
      storage, video streaming, and VPN access to the home network.
    image: images/home-server.svg
    link: ''
