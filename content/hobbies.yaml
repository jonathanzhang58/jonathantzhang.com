# The Hobbies page. Add one block per hobby. "image" is optional; drop
# hobby photos in public/images/hobbies/ and reference them as
# images/hobbies/foo.jpg (any path under public/ works). Add
# "image_fit: contain" to show the whole image (with padding) instead of
# cropping it. "text" (or "blurb") is optional — leave it out and the card
# shows just the image and title.
#
# Every hobby automatically gets its own blog-style page at /hobbies/<title>;
# clicking the tile opens it. Fill the page in by adding a "page:" list —
# see the comments in projects.yaml for the block format. Add "slug: my-url"
# next to "title:" to override the URL.

hobbies:
  - title: Camping
    # text: >-
    #   I love camping and hiking in the mountains. I have been to many national parks and forests, and I enjoy exploring new trails and landscapes.
    image: 'images/hobbies/camping/ACA_IMG_1230.png'
    page:
      - >-
        I was a boy scout as a kid, so I've always enjoyed the great outdoors. One day I hope to visit all the US national parks. Here are some of my favorite trips. 
      - heading: Acadia 2026 
      - >-
        Final Rating: 10/10
      - image: images/hobbies/camping/ACA_IMG_1113.png
        caption: Mountain in Acadia
      - >-
          Acadia is by far the best camping experience I've had. The nature is incredible and extremely diverse. There were beaches, mountains, forest trails all within 15 minutes drive within each other. It's also very close to a small town, so we were able to get groceries in the middle of the trip. Only advice would be to use the YMCAs for showering, instead of scammy coin operated showers. 
      - image: images/hobbies/camping/ACA_IMG_1219.png
        caption: Beach in Acadia
      - image: images/hobbies/camping/ACA_IMG_1245.png
        caption: Lake in Acadia
      - heading: Shenandoah 2025
      - >-
        Final Rating: 7/10
      - image: images/hobbies/camping/SHA_IMG_1018.png
        caption: Mountain Overlook in Shenandoah
      - >-
        Shenandoah was a fun trip. I think it really encompasses a great vanilla camping experience. There's some nice hikes with cool river crossings and some great views on nearby mountains. The best part has to be the drive up to the campsite, why you get to see some incredible mountain overlooks. If you're going camping for the first time, I think its a great intro to national parks. 
      - image: images/hobbies/camping/SHA_20250520_193843877_Original.jpg
        caption: Mountain in Shenandoah
      - image: images/hobbies/camping/SHA_IMG_1134.png
        caption: Forest in Shenandoah
      - image: images/hobbies/camping/SHA_20250520_160320396_Original.jpg
        caption: Waterfall in Shenandoah
  - title: Travelling
    image: 'images/hobbies/travel/IMG_0299.png'
    page:
      - >-
        Travelling is also fun. World's most basic hobby, I know, but basic things are basic because they're good. Technically, camping is travelling too, but the defining differentiator is whether or not a roof is above my head. Here's some of my favorite trips. 
      - heading: Taipei 2026
      - >-
        Final Rating: 10/10
      - image: images/hobbies/travel/TAI_IMG_0445.png
        caption: Taipei 101 from Elephant Mountain
      - >-
        This trip actually redefined my worldview. For anyone interested in any East Asian culture, Taiwan is the destination. It has tastes of Korea, Japan, and Mainland China, concentrated together. Basically the best of each destination, with none of the downsides. Taipei is just as impressive as other Asian megacities, but not nearly over-touristed. A bonus personally was that I could communicate to locals in Mandarin. People dream of Japan trips, but if I had to choose, I think I'd go back to Taiwan. 
      - image: images/hobbies/travel/TAI_IMG_0571.png
        caption: Raohe Night Market 
      - heading: Changchun 2025
      - >- 
        Final Rating: 9/10
      - image: images/hobbies/travel/CHA_IMG_7947.png
        caption: Literally a random park in Changchun at night
      - >- 
        Changchun is the capital of Jilin province in Northeast China. Not a normally tourist attraction, but I think it's my favorite city in China so far. The zoo is great with basically every animal you could imagine, and the atmosphere is very cheery and pleasant. It's also a nice break from the extreme hustle of some bigger cities, but still plenty to do. 
      - image: images/hobbies/travel/CHA_IMG_8072.png
        caption: Changchun Zoo
      - heading: Shenyang 2025
      - >-
        Final Rating: 8.5/10
      - image: images/hobbies/travel/SHE_IMG_7647.png
        caption: Night market in Shenyang
      - >-
        Shenyang is the capital of Liaoning province in Northeast China. Also a less travelled Chinese city, but still a great place to visit. I think it's almost Beijing-lite, a smaller city but still with great history, food, and attractions, without being too crowded. Not to mention there is a high speed rail connecting the two cities. 
      - image: images/hobbies/travel/SHE_IMG_7752.png
        caption: Mukden Palace in Shenyang
      - image: images/hobbies/travel/SHE_IMG_7896.png
        caption: Guaipo Park in Shenyang. The name means "strange slope", and the park is known for a slope that looks like it's going up, but is actually going down. The slope itself was a bit anticlimactic and more a photo trick, but the glass bridge, tiger exhibit, and other parts of the park were very fun.
      - heading: Beijing 2025
      - >-
        Final Rating: 6.5/10
      - image: images/hobbies/travel/BEI_IMG_8155.png
        caption: The Forbidden City in Beijing
      - >-
        Obviously, there is no shortage of things to do and see in Beijing. From the Great Wall to the Forbidden City, there really is no place on Earth like it. However, my experience was a bit marred by the tighter security, possibly due to a parade that was happening shortly after my visit. Regardless, if you only get to visit China once, Beijing is still the destination. 
      - image: images/hobbies/travel/BEI_IMG_8190.png
        caption: Somewhere in Beijing. 
      - heading: Boston 2025
      - >-
        Final Rating: 8/10
      - image: images/hobbies/travel/BOS_IMG_9176.png
        caption: River in Boston
      - >-
        Boston is a really unique American city. In fact, it's probably the only city in the US that feels a little European. The river is really beautiful and the nearby universities have some really breathtaking architecture. 
      - image: images/hobbies/travel/BOS_IMG_9163.png
        caption: Harvard University
      - image: images/hobbies/travel/BOS_IMG_9214.png
        caption: MIT
      - heading: New York 2025
      - >- 
        Final Rating: 9/10
      - image: images/hobbies/travel/NYC_IMG_9501.png
        caption: Times Square in New York
      - >- 
        I think NYC is my favorite American city. It's just so quintessentially American, and you feel like you're in a movie. The skyline is great, Central Park has some great juxtaposition, and the museums have some extremely famous exhibits. Definetely need to return. 
      - image: images/hobbies/travel/NYC_IMG_9375.png
        caption: A street near Central Park
      - heading: Washington D.C. 2025
      - >-
        Final Rating: 7/10
      - image: images/hobbies/travel/WDC_IMG_1790.png
        caption:  B-52 and B-1B bombers overhead in DC. 
      - >-
        NOT A POLITICAL STATEMENT. I go to college in Baltimore so I decided might as well see the planes in the state fair. The planes were really cool. 
      - image: images/hobbies/travel/WDC_IMG_1749.png
        caption: 250th Anniversary State fair
      - heading: Raleigh, NC 2026
      - >- 
        Final Rating: 5/10
      - image: images/hobbies/travel/RAL_IMG_1610.png
        caption: North Carolina Capitol Building
      - >-
        Raleigh is the capitol of North Carolina. The art museum is really cool. However, as you might expect, there's not a great deal to do in Raleigh. Sorry North Carolina. 
      - image: images/hobbies/travel/RAL+IMG_1609.png
        caption: Presidential Statues in Raleigh
      - heading: Richmond, VA 2026
      - >-
        Final Rating: 7/10
      - image: images/hobbies/travel/RIC_IMG_8850.png
        caption: Civil War History Museum
      - >-
        Richmond is the capital of Virginia, and the site of a great deal of American history. The museum was very well done and informative. Many historical figures are also buried here. For fellow history enjoyers, I think Richmond is one of the must sees in the US. 
      - image: images/hobbies/travel/RIC_IMG_1602.png
        caption: James Monroe's grave in Richmond
  - title: Model United Nations
    image: 'images/hobbies/mun/UNC_IMG_8646.png'
    page:
      - >-
        I did MUN in high school and I thought it was great, but my club was less a team and more "let's sit in a circle with the history teacher and talk about world politics." Surely collegiate MUN is the same thing right? NO. Competitive MUN is a unique and frightening experience that I can only describe as "competitive work politics". To award, it matters less so what laws are passed, and more so how well you "command" the room. As a result, you have a bunch of strong personalities in a room pretending to collaborate when really they're trying to make the other their pawn. It can be really frustrating sometimes, but also sometimes fun. Sometimes. Luckily for me it's just a hobby because I'm a STEM student. Here's some conferences I went to. 
      - heading: UNCMUNC 2025
      - >-
        UNC Chapel Hill's Conference. I did not win anything ;(
      - image: 'images/hobbies/mun/UNC_IMG_8646.png'
        caption: A very tired me after the conference finished. 
      - image: 'images/hobbies/mun/UNC_IMG_8637.png'
        caption: UNC Chapel Hill Old Well
      - heading: HOPMUNC 2026
      - >-
        JHU's conference. Obviously, I go here. I was a staffer, so I didn't compete. 
      - image: 'images/hobbies/mun/JHU_IMG_0174.png'
        caption: JHU School of International Studies Building, where the conference was held.
      - heading: "&MUN 2026"
      - >-
        William and Mary College's conference. I did not win anything ;(
      - heading: "UPMUNC 2023"
      - >-
        University of Pennsylvania's conference. I did not win anything ;(  
  - title: Modded Minecraft
    image: 'public\images\hobbies\MC.png'
    page:   
      - >-
        Modded Minecraft is my go to video game. I think learning all the new mods and their mechanics really appeals to me somehow. Sometimes I find it so fun I have to take a proactive break from it. Here are some of my favorite modpacks.
      - heading: All the Mods 10
      - >-
        Final Rating: 9/10
      - >- 
        ATM10 really is the pinnacle of the ATM series. It's still technically in development, so it may change up, but I think my opinion will stay the same. I'm excited to see how ATM11 will pan out. As with all the ATM modpacks, the progression is just second to none, and the questbook is phenomenal. Additionally, despite advertising itself as a "kitchen sink" modpack, it really is an automation modpack. ATM10 differs from ATM9 in a couple ways, most of which I think are good. The exclusion of Gregtech reduces the complexity significantly, replacing it with the friendlier Modern Industrialization mods. Additionally, getting rid of Alchemistry and Ad Astra really focus the modpack on its central goal of creating the ATM star. I did have some performance issues compared to ATM9 and 8, but its still very playable. Overall, great experience, but I'm not sure if I would recommend it to a new player.
      - heading: All the Mods 9
      - >-
        Final Rating: 7/10
      - >-
        Not gonna repeat myself with the ATM series. In theory, it's better than ATM8, but I personally preferred ATM8. It lies in a bit of an awkward middle ground between ATM8 and ATM10. It's too cluttered without enough guidance, and unlike ATM10, there isn't nearly as much online resources to help you. I would suggest skipping it and going straight to ATM10. Nevertheless, it still has that ATM level of quality. 
      - heading: All the Mods 8
      - >- 
        Final Rating: 8/10
      - >-
        I think ATM8 is a good intro to the ATM series. It's not as overwhelmingly complex as ATM9 or 10. Without the ore hammer and its easy ore doubling, the early game is a lot more Mekanism heavy, which forces you to learn the mod. It also introduces archeology, which becomes the standard for acquiring ATM gear in the later modpacks. Only complaint (not at the fault of the modpack) is that the Sophisticated Storage chests don't yet double chest in this version, but not much they can do there. I'd reccomend beginners start their ATM journey here, and then move on to ATM10. 
      - heading: "Society: Sunlit Valley"
      - >-
        Final Rating: 7.5/10
      - >-
        Sunlit Valley is a farming modpack. And I mean farming. You literally plant crops, ranch animals, and sell your product. Hostile mobs don't even spawn on the surface. It's meant to mimic Stardew Valley, and it does a really good job of it. There's also slime ranching too. There is some automation involved through Create, but it's not the focus. In fact you generally get rewarded for doing things manually. The only complaints I have is that by the middle-game, the costs of items needed to progress increases faster than the money you can make, causing it to be a grindy. Also without automation, you find yourself getting into the trap of waking up, watering your crops, feeding your animals, making your products, and by then it's already night, keeping you in an endless loop. 
      - heading: "Society: Sunlit Cobblemon"
      - >-
        Final Rating: 9/10
      - >- 
        Sunlit Cobblemon is basically Sunlit Valley, but with Cobblemon (sorry Pixelmon). The integration is really well done. The Cobblemon can be ranched, put to work in the farm, or just fought for coins. The extra income from them really prevents that grindy mid-game that Sunlit Valley has, really perfecting the modpack. The only complaint I have is that the endgame could use a bit more content and there should be other Cobblemon trainers in the game. 
      - heading: "Protocol Zero"
      - >-
        Final Rating: 5/10
      - >-
        I think this modpack had some good potential, but really blew it. The custom structures are really cool and the premise is interesting. However, some issues arise. First, the guidance is minimal, so I wouldn't recommend it to a new player. The biggest issue is the inclusion of the "Spore: Inquisition" mod, which dominates the experience. This mod creates a growing mass at 0,0,0 that grows too quickly and completely destroys and transforms the world, forcing you to constantly. It also will randomly teleport you to a dimension where you will certainly die. The worst part is that there is literally zero documentation on this incredibly intrusive mod, unless you join the developer's discord and ask him. Sure, the modpack is advertised as "challenging", but this is just frustrating. 
      - heading: "FTB StoneBlock 4"
      - >-
        Final Rating: 8/10
      - >-
        Stoneblock puts you underground in stone and forces you to use mods to progress as you learn more about the world. As with most FTB mods, the production quality is unmatched. There's lore, custom NPCs, and literal voice acting. This modpack is a great intro to modded Minecraft, especially automation centered ones. The only issue, and with many FTB mods as a whole, is that the beginning is quite novel, but the mid-game is largely the same automation progression. 
      - heading: "Reclamation - Reclaim the World!"
      - >-
        Final Rating: 9/10
      - >-
        Reclamation is like an FTB automation modpack done right. You are placed in a nearly barren world, void of plants, animals, and ore. You must use mods to reclaim the world and make it habitable again. The modpack is very well done, with a great questbook and a lot of guidance. Best of all, the environment continues to affect your play as you progress, instead of merely being an early game gimmick. Different mods are creatively integrated, and each little step unlocks something new you can do with the seemingly minimal resources around. Would reccomend, and makes a good intro to many different mods for a new player. The only complaint is the endgame has a bit too much complexity creep, which could be resolved if they fleshed out the questbook a bit more.
      - heading: "Better Minecraft 5"
      - >-
        Final Rating: 4/10
      - >-
        After playing so many other modpacks, the BMC modpack just starts to fall flat. I think it's more an exploration modpack if anything, but the exploration just fails to be as interesting. The questbook is really small, and weirdly enough, compared to BMC4, the world felt empty. I just feel like there isn't nearly enough to do. A decent first modpack though, I suppose. I think the loss of Alex's Mobs really did a number on the pack. 
      - heading: "Better Minecraft 4"
      - >- 
        Final Rating: 7/10
      - >-
        BMC4 was my intro to modded Minecraft, so I view it through rose-tinted glasses. It was really cool experiencing the core mods for the first time, like Farmer's Delight or Biomes O' Plenty. It really tries to mantain the core minecraft experience, meaning it doesn't really add any new mechanics, feautres, or directions. Which is fine if that's the goal. There's no real automation and the endgame is a bit lacking. Regardless, it does its job of being Vanilla+, and I think it's the best one there is. Also Alex's Mobs is in it, which is just a great mod. 
      - heading: "MC Eternal 2"
      - >-
        Final Rating: 7.5/10
      - >-
        MC Eternal 2 really does the kitchen sink modpack justice. You can really do just about anything. For those who want that, there's no better modpack. The questbook is quite good, and the new structures are really fun to explore. I think it's like a version ATM that's tuned away from automation or progression and more towards exploration and just having fun.
      - heading: "Homestead - A Cozy Survival Experience"
      - >-
        Final Rating: 6.5/10
      - >-
       Homestead was the closest thing for me to a modernized BMC4. There's plenty of new structures to explore and things to do, even without Alex's Mobs. The only complaint I have is the AI-generated art in the questbook, which gives it a bit of a sloppy feel. The quest book also is a little bit too rewarding and fails to be helpful at all past the midgame.
      - heading: Roguelike Adventures and Dungeons 2
      - >- 
        Final Rating: 9/10
      - >-
        R.A.D. 2 is a modpack that focuses on exploration and adventure. A lot of modpacks claim to be RPG modpacks, but I think only R.A.D. 2 really delivers on that promise. The world is full of dungeons, structures, and new mobs to fight, which get stronger with you. The questbook is also very well done, and the modpack is very well balanced. 
      - heading: "Raspberry Flavoured"
      - >-
        Final Rating: 9/10
      - >-
        Raspberry Flavoured is a Vanilla+ modpack, but I'd like to instead call it Vanilla*. It augments the vanilla experience, removing some mechanics and adding others. It ditches the questbook in favor of a very expansive advancements system, and really slows down the progression of Minecraft in a good way. The modpack is very well balanced, and the world is very well designed. Would recommend for those looking for a more relaxing modded Minecraft experience.
